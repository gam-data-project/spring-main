# .github/workflows/docker-build.yml
name: Build and Deploy Spring to ECR/EC2

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # GitHub 화면에서 수동 실행 가능

permissions:
  contents: read      # 저장소 코드 읽기 권한
  id-token: write     # AWS OIDC 인증용 권한

env:
  AWS_REGION: us-east-1     # ECR이 있는 AWS 리전
  ECR_REPOSITORY: spring-main # ECR 리포지토리 이름

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}   # 다음 job에서 쓸 최종 이미지 주소
      registry: ${{ steps.login-ecr.outputs.registry }} # ECR 레지스트리 주소

    steps:
      - name: Checkout
        uses: actions/checkout@v6 # GitHub 저장소 코드 가져오기

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle # Gradle 캐시 사용

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew # gradlew 실행 권한 부여

      - name: Build bootJar
        run: ./gradlew clean bootJar # Spring boot jar 빌드

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }} # GitHub OIDC로 Assume할 IAM Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2 # ECR 로그인

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4 # Docker buildx 활성화

      - name: Set image metadata
        id: meta
        run: echo "image_uri=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
        # sha 태그가 붙은 최종 이미지 주소 생성

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64 # x86_64 EC2용 이미지
          push: true             # 빌드 후 ECR에 push
          tags: |
            ${{ steps.meta.outputs.image_uri }} # 커밋 sha 태그
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest # latest 태그
          cache-from: type=gha
          cache-to: type=gha,mode=max # GitHub Actions 캐시 사용

  deploy:
    needs: build-and-push # build-and-push 성공 후 실행
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          REGISTRY: ${{ needs.build-and-push.outputs.registry }} # ECR registry 주소
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }} # 이번 빌드 이미지 주소
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          EXCEL_COMMON_IMPORT_BASE_DIR: ${{ vars.EXCEL_COMMON_IMPORT_BASE_DIR }}
          EXCEL_COMMON_IMPORT_RECIPIENT_FILTER: ${{ vars.EXCEL_COMMON_IMPORT_RECIPIENT_FILTER }}
        with:
          host: ${{ secrets.EC2_HOST }}         # 배포 대상 EC2 퍼블릭 IP 또는 DNS
          username: ${{ secrets.EC2_USERNAME }} # 보통 ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}       # pem 파일 내용 전체
          script_stop: true                     # 명령 실패 시 중단
          envs: AWS_REGION,REGISTRY,IMAGE_URI,SPRING_DATASOURCE_URL,SPRING_DATASOURCE_USERNAME,SPRING_DATASOURCE_PASSWORD,EXCEL_COMMON_IMPORT_BASE_DIR,EXCEL_COMMON_IMPORT_RECIPIENT_FILTER
          script: |
            mkdir -p /home/ubuntu/gamfile
            # EC2에 필요한 디렉터리 생성

            aws ecr get-login-password --region "$AWS_REGION" \
              | docker login --username AWS --password-stdin "$REGISTRY"
            # EC2에서 ECR 로그인

            docker pull "$IMAGE_URI"
            # 새 이미지 pull

            docker rm -f spring-main || true
            # 기존 spring-main 컨테이너가 있으면 강제 삭제

            docker run -d \
              --name spring-main \
              --restart unless-stopped \
              -p 8080:8080 \
              -v /home/ubuntu/gamfile:/home/ubuntu/gamfile \
              -e SPRING_DATASOURCE_URL="$SPRING_DATASOURCE_URL" \
              -e SPRING_DATASOURCE_USERNAME="$SPRING_DATASOURCE_USERNAME" \
              -e SPRING_DATASOURCE_PASSWORD="$SPRING_DATASOURCE_PASSWORD" \
              -e EXCEL_COMMON_IMPORT_BASE_DIR="$EXCEL_COMMON_IMPORT_BASE_DIR" \
              -e EXCEL_COMMON_IMPORT_RECIPIENT_FILTER="$EXCEL_COMMON_IMPORT_RECIPIENT_FILTER" \
              "$IMAGE_URI" \
              java -jar app.jar
            # 새 컨테이너 실행
            # Dockerfile에 ENTRYPOINT가 없어서 java -jar app.jar를 직접 붙임